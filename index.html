<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prumo Billing Trial</title>
    <style>
      :root {
        color: #18201b;
        background: #f6f8f5;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        padding: 28px;
        border: 1px solid #dfe7dc;
        border-radius: 8px;
        background: white;
        box-shadow: 0 22px 60px rgba(24, 32, 27, 0.1);
      }

      p {
        color: #657166;
        font-weight: 700;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 8px;
        background: #0f8f5a;
        color: white;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Ambiente demonstrativo</p>
      <h1>Prumo Billing Trial</h1>
      <p>
        Este arquivo é apenas um aviso. O frontend real roda pelo Vite em
        <strong>http://localhost:4010</strong>, conectado ao backend Rails em
        <strong>http://localhost:3010</strong>.
      </p>
      <a href="http://localhost:4010">Abrir frontend</a>
    </main>
  </body>
</html>
